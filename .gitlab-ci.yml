# .gitlab-ci.yml
stages:
  - build
  - format
  - lint
  - type_check
  - security
  - test

variables:
  PYTHON_VERSION: "3.12"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key:
    files:
      - pyproject.toml
  paths:
    - $PIP_CACHE_DIR
    - .venv/

default:
  before_script:
    - python -m venv .venv
    - .venv/Scripts/python.exe -m pip install --upgrade pip
    - .venv/Scripts/python.exe -m pip install .[dev]

install_deps:
  stage: build
  script:
    - echo "Dependencies installed successfully."

format:
  stage: format
  script:
    - .venv/Scripts/ruff.exe format --check .

lint:
  stage: lint
  script:
    - .venv/Scripts/ruff.exe check .

type_check:
  stage: type_check
  script:
    - .venv/Scripts/mypy.exe .

dependency_audit:
  stage: security
  script:
    - .venv/Scripts/pip-audit.exe --ignore-vuln CVE-2026-45829 --ignore-vuln CVE-2025-69872

semgrep_sast:
  stage: security
  script:
    - echo "Semgrep is skipped on Windows shell runners as it requires WSL/Linux natively."

coverage:
  stage: test
  script:
    - .venv/Scripts/pytest.exe --cov=. --cov-report=term-missing --cov-fail-under=85
  coverage: '/^TOTAL.+?(\d+\%)$/'